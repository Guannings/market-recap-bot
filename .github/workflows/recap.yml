name: Market Recap Email

on:
  schedule:
    # GitHub Actions cron is UTC. 7:30am GMT+8 = 23:30 UTC the prior day.
    # 23:30 UTC Mon–Fri => 7:30am GMT+8 Tue–Sat (recaps each US close).
    - cron: "30 23 * * 1-5"
  workflow_dispatch:   # lets you run it manually from the Actions tab

# Lets the keepalive step push a tiny commit (resets the 60-day auto-disable timer).
permissions:
  contents: write

jobs:
  send-recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Send recap
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: python market_recap.py

      # Keepalive: GitHub disables scheduled workflows after 60 days with no repo
      # activity. This pushes a tiny commit only when the last commit is >45 days
      # old, which resets that timer. Plain shell (no third-party action), so it
      # is never subject to the "allowed actions" policy.
      - name: Keepalive (prevent 60-day auto-disable)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          LAST=$(git log -1 --format=%ct)
          AGE_DAYS=$(( ( $(date +%s) - LAST ) / 86400 ))
          if [ "$AGE_DAYS" -ge 45 ]; then
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
            git add .keepalive
            git commit -m "keepalive: keep scheduled workflow active"
            git push
          else
            echo "Last commit was $AGE_DAYS days ago — no keepalive needed yet."
          fi
