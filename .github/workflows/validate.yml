name: validate

# Safety gate: every PR (including Copilot's auto-fix PRs) must pass this before
# it can merge. Runs the bot in --dry-run (no email sent, no secrets needed), so
# a fix that doesn't even run can never reach your live bot.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "market_recap.py"
      - "requirements.txt"
      - ".github/workflows/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Syntax check
        run: python -c "import ast; ast.parse(open('market_recap.py').read())"
      - name: Smoke test — US session (no email sent)
        run: python market_recap.py --dry-run
      - name: Smoke test — Europe session (no email sent)
        run: python market_recap.py --session europe --dry-run

  # If the PR is from the Copilot agent and validation passed, merge it
  # automatically — fully hands-off.
  automerge-copilot:
    needs: validate
    runs-on: ubuntu-latest
    if: >-
      ${{ contains(github.event.pull_request.user.login, 'copilot') ||
          contains(github.event.pull_request.user.login, 'Copilot') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash-merge the validated Copilot PR
        # Use the PAT, not GITHUB_TOKEN: runs triggered by a bot's PR get a
        # read-only default token, which can't perform the merge.
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          gh pr ready "$PR" --repo "$REPO" || true   # un-draft if still a draft
          gh pr merge "$PR" --squash --repo "$REPO"
